<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FiscalPro — Caderno de Erros</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1318;--sur:#181e27;--sur2:#1e2736;--sur3:#252f40;
  --bdr:#2d3a4e;--bdr2:#3a4d65;
  --gold:#f5a623;--gglow:rgba(245,166,35,.13);
  --grn:#22c55e;--grndim:rgba(34,197,94,.12);
  --red:#ef4444;--reddim:rgba(239,68,68,.12);
  --org:#f97316;--orgdim:rgba(249,115,22,.12);
  --blu:#3b82f6;--bludim:rgba(59,130,246,.12);
  --pur:#a855f7;--purdim:rgba(168,85,247,.12);
  --txt:#e2e8f0;--muted:#7a8fa6;--dim:#3d5068;
  --rad:8px;--radl:14px;--radx:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:50}
.logo-ico{width:26px;height:26px;background:linear-gradient(135deg,var(--gold),#c4851c);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.logo-txt{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--gold)}
.sep{width:1px;height:20px;background:var(--bdr);margin:0 2px}
.pgt{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.back-btn{margin-left:auto;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rad);padding:5px 12px;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .15s}
.back-btn:hover{border-color:var(--gold);color:var(--gold)}
.hdr-badge{font-size:9px;padding:2px 8px;border-radius:10px;background:var(--reddim);color:var(--red);border:1px solid rgba(239,68,68,.3);font-weight:700}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 53px)}
.sidebar{width:260px;min-width:260px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-hdr{padding:14px 16px;border-bottom:1px solid var(--bdr)}
.sidebar-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.main{flex:1;overflow-y:auto;padding:20px 24px}

/* BOTÃO ADD */
.btn-add{width:100%;background:linear-gradient(135deg,var(--gold),#c4851c);color:#000;border:none;border-radius:var(--rad);padding:10px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;margin-bottom:12px}
.btn-add:hover{opacity:.9;transform:translateY(-1px)}

/* FILTROS */
.filter-group{margin-bottom:8px}
.filter-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-weight:700;padding:8px 16px 4px;display:block}
.mat-btn{width:100%;text-align:left;background:none;border:none;padding:7px 16px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;transition:all .15s;border-left:3px solid transparent}
.mat-btn:hover{color:var(--txt);background:rgba(255,255,255,.03)}
.mat-btn.on{color:var(--gold);border-left-color:var(--gold);background:var(--gglow)}
.mat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mat-count{margin-left:auto;font-size:9px;background:var(--reddim);color:var(--red);padding:1px 5px;border-radius:8px;font-weight:700}

/* STATS SIDEBAR */
.stats-box{margin:12px 16px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rad);padding:10px 12px}
.stat-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:2px 0}
.stat-row span:first-child{color:var(--muted)}
.stat-row span:last-child{font-weight:700;font-family:'Syne',sans-serif}

/* CONTEÚDO PRINCIPAL */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-txt{font-size:13px;line-height:1.6}

/* CARD DE QUESTÃO */
.q-card{background:var(--sur);border:1px solid var(--bdr);border-left:4px solid var(--red);border-radius:var(--radl);padding:16px 18px;margin-bottom:10px;transition:all .2s}
.q-card:hover{border-color:var(--bdr2);border-left-color:var(--red)}
.q-card.revisada{border-left-color:var(--grn);opacity:.7}
.q-card-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.q-num{font-size:9px;font-weight:700;color:var(--dim);font-family:'Syne',sans-serif;background:var(--sur2);border:1px solid var(--bdr);border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.q-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700}
.b-mat{background:var(--bludim);color:var(--blu);border:1px solid rgba(59,130,246,.3)}
.b-banca{background:var(--purdim);color:var(--pur);border:1px solid rgba(168,85,247,.3)}
.b-top{background:var(--sur2);color:var(--muted);border:1px solid var(--bdr)}
.b-rev{background:var(--grndim);color:var(--grn);border:1px solid rgba(34,197,94,.3)}
.b-tipo{background:var(--orgdim);color:var(--org);border:1px solid rgba(249,115,22,.3)}
.q-enunciado{font-size:13px;line-height:1.7;color:var(--txt);margin-bottom:10px}
.q-alternativas{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.alt{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:6px;background:var(--sur2);border:1px solid var(--bdr);font-size:12px;line-height:1.5}
.alt-letra{font-weight:700;font-family:'Syne',sans-serif;min-width:16px;flex-shrink:0;color:var(--muted)}
.alt.gabarito{background:var(--grndim);border-color:rgba(34,197,94,.4)}
.alt.gabarito .alt-letra{color:var(--grn)}

/* RESPOSTA COLAPSÁVEL */
.resp-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rad);font-size:11px;font-weight:600;color:var(--muted);transition:all .15s;user-select:none;width:100%}
.resp-toggle:hover{border-color:var(--gold);color:var(--gold)}
.resp-toggle.open{border-color:var(--gold);color:var(--gold);background:var(--gglow)}
.resp-body{display:none;margin-top:8px;padding:12px 14px;background:var(--sur2);border:1px solid rgba(34,197,94,.3);border-radius:var(--rad);font-size:12.5px;line-height:1.75;color:var(--txt)}
.resp-body.show{display:block}
.resp-gabarito{font-family:'Syne',sans-serif;font-weight:700;color:var(--grn);font-size:13px;margin-bottom:6px}

/* AÇÕES DO CARD */
.q-actions{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--bdr)}
.btn{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;line-height:1}
.btn-rev{background:var(--grndim);color:var(--grn);border:1px solid rgba(34,197,94,.3)}
.btn-rev:hover{background:rgba(34,197,94,.2)}
.btn-del{background:var(--reddim);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-del:hover{background:rgba(239,68,68,.2)}
.btn-edit{background:var(--sur2);color:var(--muted);border:1px solid var(--bdr)}
.btn-edit:hover{border-color:var(--gold);color:var(--gold)}
.btn-unrev{background:var(--sur2);color:var(--muted);border:1px solid var(--bdr);font-size:10px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.ov.hidden{display:none!important}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--radx);padding:22px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.fg{margin-bottom:12px}
.flbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;display:block;font-weight:600}
.fi,.fs,.fta{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rad);padding:8px 10px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--gold)}
.fs option{background:var(--sur)}
.fta{resize:vertical;min-height:80px;line-height:1.6}
.frow{display:flex;gap:10px}.frow .fg{flex:1}
.fhint{font-size:9px;color:var(--muted);margin-top:3px;line-height:1.5}

/* TIPO SELETOR */
.tipo-sel{display:flex;gap:6px;margin-bottom:4px}
.tipo-opt{flex:1;padding:8px;border:2px solid var(--bdr);border-radius:var(--rad);background:var(--sur2);cursor:pointer;text-align:center;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s}
.tipo-opt.on{border-color:var(--gold);background:var(--gglow);color:var(--gold)}

/* ALTERNATIVAS NO FORM */
.alts-form{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.alt-form-row{display:flex;gap:8px;align-items:flex-start}
.alt-form-letra{width:28px;height:36px;background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--muted);flex-shrink:0;margin-top:0}
.alt-form-input{flex:1;background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color .2s;resize:none;line-height:1.4}
.alt-form-input:focus{border-color:var(--bdr2)}
.gabarito-sel{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.gab-opt{padding:4px 10px;border:1px solid var(--bdr);border-radius:6px;background:var(--sur2);cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);transition:all .15s}
.gab-opt.on{border-color:var(--grn);background:var(--grndim);color:var(--grn)}

/* VF */
.vf-sel{display:flex;gap:8px}
.vf-opt{flex:1;padding:10px;border:2px solid var(--bdr);border-radius:var(--rad);background:var(--sur2);cursor:pointer;text-align:center;font-weight:700;font-size:13px;transition:all .15s;color:var(--muted)}
.vf-opt.verd.on{border-color:var(--grn);background:var(--grndim);color:var(--grn)}
.vf-opt.fals.on{border-color:var(--red);background:var(--reddim);color:var(--red)}

/* MFOOT */
.mfoot{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr)}
.btn-primary{flex:1;background:var(--gold);color:#000;border:none;border-radius:var(--rad);padding:10px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:#d4920f}
.btn-cancel{background:transparent;color:var(--muted);border:1px solid var(--bdr);border-radius:var(--rad);padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{border-color:var(--gold);color:var(--gold)}

/* COLA RÁPIDA */
.cola-area{background:var(--sur2);border:2px dashed var(--bdr2);border-radius:var(--rad);padding:12px;font-size:11px;color:var(--muted);line-height:1.7;cursor:pointer;transition:all .15s;text-align:center}
.cola-area:hover{border-color:var(--gold);color:var(--txt)}
.cola-tabs{display:flex;gap:4px;background:var(--sur2);border-radius:8px;padding:3px;margin-bottom:12px}
.cola-tab{flex:1;padding:6px;border-radius:6px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.cola-tab.on{background:var(--sur);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* SCROLL */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:10px 16px;font-size:12px;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.4);transform:translateY(60px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(34,197,94,.4);color:var(--grn)}
.toast.err{border-color:rgba(239,68,68,.4);color:var(--red)}

@media(max-width:700px){
  .layout{flex-direction:column;height:auto;overflow:visible}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--bdr);overflow:visible}
  .main{padding:14px 16px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo-ico">⚖️</div>
  <div class="logo-txt">FiscalPro</div>
  <div class="sep"></div>
  <div class="pgt">❌ Caderno de Erros</div>
  <div class="hdr-badge" id="hdr-total">0 questões</div>
  <a href="index.html" class="back-btn">← Voltar ao app</a>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-hdr">
      <button class="btn-add" onclick="abrirModal()">
        <span style="font-size:16px">+</span> Nova Questão
      </button>
      <div class="stats-box" id="stats-box">
        <div class="stat-row"><span>Total de erros</span><span id="s-total" style="color:var(--red)">0</span></div>
        <div class="stat-row"><span>Pendentes</span><span id="s-pend" style="color:var(--org)">0</span></div>
        <div class="stat-row"><span>Revisadas</span><span id="s-rev" style="color:var(--grn)">0</span></div>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">Matéria</span>
      <button class="mat-btn on" data-mat="" onclick="setFiltro('',this)">
        <span class="mat-dot" style="background:var(--muted)"></span>
        Todas
        <span class="mat-count" id="cnt-todas">0</span>
      </button>
      <div id="mat-filtros"></div>
    </div>

    <div class="filter-group" style="margin-top:4px">
      <span class="filter-label">Status</span>
      <button class="mat-btn on" data-st="" onclick="setFiltroSt('',this)">
        <span class="mat-dot" style="background:var(--muted)"></span>Todas
      </button>
      <button class="mat-btn" data-st="pendente" onclick="setFiltroSt('pendente',this)">
        <span class="mat-dot" style="background:var(--red)"></span>Pendentes
      </button>
      <button class="mat-btn" data-st="revisada" onclick="setFiltroSt('revisada',this)">
        <span class="mat-dot" style="background:var(--grn)"></span>Revisadas
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="section-hdr">
      <div class="section-title" id="section-title">
        <span>Todas as questões</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="text" id="busca" placeholder="🔍 Buscar..." oninput="render()"
          style="background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rad);padding:5px 10px;color:var(--txt);font-size:11px;font-family:'DM Sans',sans-serif;outline:none;width:180px">
      </div>
    </div>
    <div id="lista"></div>
  </main>
</div>

<!-- MODAL NOVA / EDITAR QUESTÃO -->
<div class="ov hidden" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-titulo">➕ Nova Questão</div>

    <!-- TIPO -->
    <div class="fg">
      <label class="flbl">Tipo de questão</label>
      <div class="tipo-sel">
        <div class="tipo-opt on" onclick="setTipo('mc',this)">🔘 Múltipla escolha</div>
        <div class="tipo-opt" onclick="setTipo('vf',this)">✅ Verdadeiro / Falso</div>
        <div class="tipo-opt" onclick="setTipo('disc',this)">📝 Discursiva</div>
      </div>
    </div>

    <!-- METADADOS -->
    <div class="frow">
      <div class="fg">
        <label class="flbl">Matéria</label>
        <select class="fs" id="f-mat"></select>
      </div>
      <div class="fg">
        <label class="flbl">Banca / Fonte</label>
        <input type="text" class="fi" id="f-banca" placeholder="CESPE, FCC, TEC...">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">Tópico</label>
        <input type="text" class="fi" id="f-top" placeholder="Ex: Fato Gerador, CTN Art. 3º">
      </div>
      <div class="fg">
        <label class="flbl">Ano (opcional)</label>
        <input type="text" class="fi" id="f-ano" placeholder="Ex: 2024">
      </div>
    </div>

    <!-- ENUNCIADO -->
    <div class="fg">
      <label class="flbl">Enunciado da questão</label>
      <textarea class="fta" id="f-enun" style="min-height:100px" placeholder="Cole ou digite o enunciado completo da questão..."></textarea>
    </div>

    <!-- ALTERNATIVAS (MC) -->
    <div id="bloco-mc">
      <div class="fg">
        <label class="flbl">Alternativas</label>
        <div class="alts-form" id="alts-form">
          <div class="alt-form-row"><div class="alt-form-letra">A</div><textarea class="alt-form-input" id="alt-A" rows="1" placeholder="Alternativa A"></textarea></div>
          <div class="alt-form-row"><div class="alt-form-letra">B</div><textarea class="alt-form-input" id="alt-B" rows="1" placeholder="Alternativa B"></textarea></div>
          <div class="alt-form-row"><div class="alt-form-letra">C</div><textarea class="alt-form-input" id="alt-C" rows="1" placeholder="Alternativa C"></textarea></div>
          <div class="alt-form-row"><div class="alt-form-letra">D</div><textarea class="alt-form-input" id="alt-D" rows="1" placeholder="Alternativa D"></textarea></div>
          <div class="alt-form-row"><div class="alt-form-letra">E</div><textarea class="alt-form-input" id="alt-E" rows="1" placeholder="Alternativa E (opcional)"></textarea></div>
        </div>
        <label class="flbl" style="margin-top:10px">Gabarito</label>
        <div class="gabarito-sel" id="gab-sel">
          <div class="gab-opt" onclick="setGab('A',this)">A</div>
          <div class="gab-opt" onclick="setGab('B',this)">B</div>
          <div class="gab-opt" onclick="setGab('C',this)">C</div>
          <div class="gab-opt" onclick="setGab('D',this)">D</div>
          <div class="gab-opt" onclick="setGab('E',this)">E</div>
        </div>
      </div>
    </div>

    <!-- VF -->
    <div id="bloco-vf" style="display:none">
      <div class="fg">
        <label class="flbl">Gabarito</label>
        <div class="vf-sel">
          <div class="vf-opt verd" onclick="setVF('V',this)">✅ Verdadeiro</div>
          <div class="vf-opt fals" onclick="setVF('F',this)">❌ Falso</div>
        </div>
      </div>
    </div>

    <!-- COLA RÁPIDA -->
    <div class="fg">
      <label class="flbl">Por que você errou?</label>
      <textarea class="fta" id="f-pq" style="min-height:70px" placeholder="Explique o motivo do erro para não errar na próxima vez...&#10;Ex: Confundi RPPS com RGPS, não soube o artigo correto..."></textarea>
    </div>

    <div class="fg">
      <label class="flbl">Explicação / Comentário da resposta</label>
      <textarea class="fta" id="f-resp" style="min-height:90px" placeholder="Cole aqui o comentário da questão ou a explicação detalhada da resposta correta..."></textarea>
    </div>

    <div class="mfoot">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" onclick="salvar()">💾 Salvar no Caderno</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

const firebaseConfig = {
  apiKey: "AIzaSyBNWJ6OsxL_1hf1VB8eV3FrbYbRcS_7F50",
  authDomain: "fiscalpro-cfa14.firebaseapp.com",
  projectId: "fiscalpro-cfa14",
  storageBucket: "fiscalpro-cfa14.firebasestorage.app",
  messagingSenderId: "753569377863",
  appId: "1:753569377863:web:f61313b20465f7d6b08b62"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let S = null, currentUser = null;
let filtroMat = '', filtroSt = '', tipoAtual = 'mc', gabAtual = '', vfAtual = '', editId = null;

const COR_MATS = {
  'Direito Tributário':'#f5a623','Direito Constitucional':'#3b82f6',
  'Direito Administrativo':'#22c55e','Português':'#a855f7',
  'Matemática / Raciocínio Lógico':'#ef4444'
};

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  try {
    const snap = await db.collection('usuarios').doc(user.uid).collection('dados').doc('estado').get();
    S = snap.exists ? snap.data() : {};
    if (!S.cadErros) S.cadErros = [];
    if (!S.mats) S.mats = [];
    populaMats();
    render();
  } catch(e) { console.error(e); S = {cadErros:[], mats:[]}; populaMats(); render(); }
});

async function salvarFirestore() {
  if (!currentUser) return;
  try {
    await db.collection('usuarios').doc(currentUser.uid).collection('dados').doc('estado').set(
      { cadErros: S.cadErros, _ts: Date.now() }, { merge: true }
    );
  } catch(e) { console.error('Erro ao salvar:', e); }
}

function td() { return new Date().toISOString().split('T')[0]; }
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

function populaMats() {
  const mats = (S.mats||[]).map(m=>m.nome);
  const uniq = [...new Set([...mats, ...Object.keys(COR_MATS)])];
  const sel = document.getElementById('f-mat');
  sel.innerHTML = uniq.map(m=>`<option value="${m}">${m}</option>`).join('');
}

function setFiltro(mat, el) {
  filtroMat = mat;
  document.querySelectorAll('.mat-btn[data-mat]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}
function setFiltroSt(st, el) {
  filtroSt = st;
  document.querySelectorAll('.mat-btn[data-st]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function setTipo(t, el) {
  tipoAtual = t;
  document.querySelectorAll('.tipo-opt').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('bloco-mc').style.display = t==='mc'?'block':'none';
  document.getElementById('bloco-vf').style.display = t==='vf'?'block':'none';
}
function setGab(g, el) {
  gabAtual = g;
  document.querySelectorAll('.gab-opt').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
}
function setVF(v, el) {
  vfAtual = v;
  document.querySelectorAll('.vf-opt').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
}

function abrirModal(id = null) {
  editId = id;
  document.getElementById('modal-titulo').textContent = id ? '✏️ Editar Questão' : '➕ Nova Questão';
  // Reset
  ['f-enun','f-banca','f-top','f-ano','f-pq','f-resp'].forEach(x=>document.getElementById(x).value='');
  ['alt-A','alt-B','alt-C','alt-D','alt-E'].forEach(x=>document.getElementById(x).value='');
  document.querySelectorAll('.gab-opt').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.vf-opt').forEach(x=>x.classList.remove('on'));
  gabAtual='';vfAtual='';

  if (id) {
    const q = S.cadErros.find(x=>x.id===id);
    if (!q) return;
    tipoAtual = q.tipo||'mc';
    setTipo(tipoAtual, document.querySelector(`.tipo-opt:nth-child(${tipoAtual==='mc'?1:tipoAtual==='vf'?2:3})`));
    document.getElementById('f-enun').value = q.enun||'';
    document.getElementById('f-banca').value = q.banca||'';
    document.getElementById('f-top').value = q.top||'';
    document.getElementById('f-ano').value = q.ano||'';
    document.getElementById('f-pq').value = q.pq||'';
    document.getElementById('f-resp').value = q.resp||'';
    const sel=document.getElementById('f-mat');
    for(let o of sel.options) if(o.value===q.mat) o.selected=true;
    if(tipoAtual==='mc'&&q.alts){
      ['A','B','C','D','E'].forEach(l=>{const el=document.getElementById('alt-'+l);if(el)el.value=q.alts[l]||'';});
      if(q.gab){gabAtual=q.gab;document.querySelectorAll('.gab-opt').forEach(x=>{if(x.textContent===q.gab)x.classList.add('on');});}
    }
    if(tipoAtual==='vf'&&q.gab){
      vfAtual=q.gab;
      document.querySelectorAll('.vf-opt').forEach(x=>{
        if((q.gab==='V'&&x.classList.contains('verd'))||(q.gab==='F'&&x.classList.contains('fals')))x.classList.add('on');
      });
    }
  } else {
    setTipo('mc', document.querySelector('.tipo-opt'));
    document.getElementById('f-mat').selectedIndex=0;
  }
  document.getElementById('modal').classList.remove('hidden');
}

function fecharModal() { document.getElementById('modal').classList.add('hidden'); }

function salvar() {
  const enun = document.getElementById('f-enun').value.trim();
  if (!enun) { toast('Informe o enunciado!','err'); return; }
  const mat = document.getElementById('f-mat').value;
  const resp = document.getElementById('f-resp').value.trim();
  const pq = document.getElementById('f-pq').value.trim();

  let gab = tipoAtual==='mc' ? gabAtual : tipoAtual==='vf' ? vfAtual : 'Ver resposta';
  if (tipoAtual==='mc' && !gab) { toast('Selecione o gabarito!','err'); return; }
  if (tipoAtual==='vf' && !gab) { toast('Selecione Verdadeiro ou Falso!','err'); return; }

  const alts = {};
  if (tipoAtual==='mc') {
    ['A','B','C','D','E'].forEach(l=>{
      const v=document.getElementById('alt-'+l).value.trim();
      if(v) alts[l]=v;
    });
  }

  const q = {
    id: editId || Date.now(),
    tipo: tipoAtual, mat, enun, gab, alts,
    banca: document.getElementById('f-banca').value.trim(),
    top: document.getElementById('f-top').value.trim(),
    ano: document.getElementById('f-ano').value.trim(),
    pq, resp,
    status: 'pendente',
    data: td()
  };

  if (editId) {
    const i = S.cadErros.findIndex(x=>x.id===editId);
    if(i>=0){ q.status=S.cadErros[i].status; S.cadErros[i]=q; }
  } else {
    S.cadErros.push(q);
  }

  salvarFirestore();
  fecharModal();
  render();
  toast(editId ? '✅ Questão atualizada!' : '✅ Questão adicionada ao caderno!');
  editId = null;
}

function excluir(id) {
  if (!confirm('Excluir esta questão do caderno?')) return;
  S.cadErros = S.cadErros.filter(x=>x.id!==id);
  salvarFirestore();
  render();
  toast('Questão removida','ok');
}

function marcarRevisada(id) {
  const q = S.cadErros.find(x=>x.id===id);
  if (!q) return;
  q.status = q.status==='revisada' ? 'pendente' : 'revisada';
  q.revisadaEm = q.status==='revisada' ? td() : null;
  salvarFirestore();
  render();
  toast(q.status==='revisada' ? '✅ Marcada como revisada!' : 'Voltou para pendente');
}

function toggleResp(id) {
  const body = document.getElementById('resp-'+id);
  const btn = document.getElementById('rbtn-'+id);
  if (!body||!btn) return;
  const isOpen = body.classList.toggle('show');
  btn.classList.toggle('open', isOpen);
  btn.innerHTML = isOpen ? '🔍 Ocultar resposta' : '🔍 Ver resposta / gabarito';
}

function render() {
  if (!S) return;
  const busca = (document.getElementById('busca')?.value||'').toLowerCase();
  let lista = S.cadErros||[];
  if (filtroMat) lista = lista.filter(q=>q.mat===filtroMat);
  if (filtroSt) lista = lista.filter(q=>q.status===filtroSt);
  if (busca) lista = lista.filter(q=>(q.enun||'').toLowerCase().includes(busca)||(q.top||'').toLowerCase().includes(busca)||(q.banca||'').toLowerCase().includes(busca));

  // Atualizar stats
  const all = S.cadErros||[];
  document.getElementById('s-total').textContent = all.length;
  document.getElementById('s-pend').textContent = all.filter(q=>q.status!=='revisada').length;
  document.getElementById('s-rev').textContent = all.filter(q=>q.status==='revisada').length;
  document.getElementById('cnt-todas').textContent = all.length;
  document.getElementById('hdr-total').textContent = all.length + ' questão' + (all.length!==1?'es':'');

  // Atualizar filtros de matéria
  const mats = {};
  all.forEach(q=>{ if(!mats[q.mat])mats[q.mat]=0; mats[q.mat]++; });
  const mf = document.getElementById('mat-filtros');
  mf.innerHTML = Object.entries(mats).map(([m,n])=>{
    const cor = COR_MATS[m] || (S.mats||[]).find(x=>x.nome===m)?.cor || 'var(--muted)';
    return `<button class="mat-btn ${filtroMat===m?'on':''}" data-mat="${m}" onclick="setFiltro('${m}',this)">
      <span class="mat-dot" style="background:${cor}"></span>${m}<span class="mat-count">${n}</span>
    </button>`;
  }).join('');

  // Atualizar título
  document.getElementById('section-title').innerHTML =
    `<span>${filtroMat||'Todas as matérias'}</span>
     <span style="font-size:11px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400">${lista.length} questão${lista.length!==1?'es':''}</span>`;

  // Renderizar cards
  const el = document.getElementById('lista');
  if (!lista.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">📖</div><div class="empty-txt">${busca||filtroMat||filtroSt?'Nenhuma questão encontrada com esses filtros.':'Nenhuma questão no caderno ainda.<br>Clique em <strong>+ Nova Questão</strong> para começar.'}</div></div>`;
    return;
  }

  el.innerHTML = [...lista].reverse().map((q,i) => {
    const cor = COR_MATS[q.mat] || (S.mats||[]).find(m=>m.nome===q.mat)?.cor || 'var(--muted)';
    const isRev = q.status==='revisada';

    // Alternativas
    let altsHtml = '';
    if (q.tipo==='mc' && q.alts && Object.keys(q.alts).length) {
      altsHtml = `<div class="q-alternativas">${['A','B','C','D','E'].filter(l=>q.alts[l]).map(l=>
        `<div class="alt ${q.gab===l?'gabarito':''}"><span class="alt-letra">${l}</span><span>${q.alts[l]}</span></div>`
      ).join('')}</div>`;
    }

    // Gabarito display
    let gabDisplay = '';
    if (q.tipo==='mc') gabDisplay = `Alternativa ${q.gab}`;
    else if (q.tipo==='vf') gabDisplay = q.gab==='V' ? '✅ Verdadeiro' : '❌ Falso';
    else gabDisplay = 'Ver explicação';

    return `<div class="q-card ${isRev?'revisada':''}" id="qc-${q.id}">
      <div class="q-card-hdr">
        <span class="q-num">#${lista.length-i}</span>
        <div style="flex:1">
          <div class="q-meta">
            <span class="badge b-mat" style="color:${cor};border-color:${cor}40;background:${cor}15">● ${q.mat}</span>
            ${q.banca?`<span class="badge b-banca">${q.banca}</span>`:''}
            ${q.ano?`<span class="badge b-top">${q.ano}</span>`:''}
            ${q.tipo==='vf'?'<span class="badge b-tipo">V/F</span>':q.tipo==='disc'?'<span class="badge b-tipo">Disc.</span>':''}
            ${isRev?'<span class="badge b-rev">✓ Revisada</span>':''}
          </div>
          ${q.top?`<div style="font-size:10px;color:var(--dim);margin-top:1px">📌 ${q.top}</div>`:''}
        </div>
      </div>

      <div class="q-enunciado">${(q.enun||'').replace(/\n/g,'<br>')}</div>
      ${altsHtml}

      ${q.pq?`<div style="background:var(--reddim);border:1px solid rgba(239,68,68,.2);border-radius:var(--rad);padding:8px 12px;font-size:11px;color:var(--muted);margin-bottom:10px">
        💭 <strong style="color:var(--red)">Por que errei:</strong> ${q.pq}
      </div>`:''}

      <button class="resp-toggle" id="rbtn-${q.id}" onclick="toggleResp(${q.id})">
        🔍 Ver resposta / gabarito
      </button>
      <div class="resp-body" id="resp-${q.id}">
        <div class="resp-gabarito">✅ Gabarito: ${gabDisplay}</div>
        ${q.resp?`<div style="border-top:1px solid var(--bdr);padding-top:8px;margin-top:8px">${(q.resp||'').replace(/\n/g,'<br>')}</div>`:''}
      </div>

      <div class="q-actions">
        ${!isRev
          ? `<button class="btn btn-rev" onclick="marcarRevisada(${q.id})">✅ Marcar como revisada</button>`
          : `<button class="btn btn-unrev" onclick="marcarRevisada(${q.id})">↩ Voltar para pendente</button>`
        }
        <button class="btn btn-edit" onclick="abrirModal(${q.id})">✏️ Editar</button>
        <button class="btn btn-del" onclick="excluir(${q.id})">🗑 Excluir</button>
        ${q.data?`<span style="margin-left:auto;font-size:9px;color:var(--dim);align-self:center">${q.data}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// Fechar modal com ESC
document.addEventListener('keydown', e => { if(e.key==='Escape') fecharModal(); });
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) fecharModal(); });
</script>
</body>
</html>
